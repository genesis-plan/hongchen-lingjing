<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>红尘灵境 - 3D预览版</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            min-height: 100vh;
            overflow-x: hidden;
        }
        
        .header {
            text-align: center;
            padding: 40px 20px;
        }
        
        .main-title {
            font-size: 3.5em;
            font-weight: bold;
            margin-bottom: 10px;
            text-shadow: 0 2px 10px rgba(0,0,0,0.3);
        }
        
        .subtitle {
            font-size: 1.3em;
            opacity: 0.9;
            margin-bottom: 30px;
        }
        
        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        
        .demo-section {
            width: 100%;
            margin-bottom: 50px;
        }
        
        .demo-title {
            font-size: 2em;
            margin-bottom: 20px;
            text-align: center;
        }
        
        /* 3D容器 */
        .three-container {
            width: 100%;
            height: 500px;
            background: #1a1a1a;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            position: relative;
        }
        
        /* 建筑选择 */
        .building-selection {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-top: 30px;
        }
        
        .building-card {
            background: rgba(255, 255, 255, 0.1);
            padding: 20px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .building-card:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: translateY(-5px);
        }
        
        .building-card h3 {
            font-size: 1.3em;
            margin-bottom: 10px;
            color: #fff;
        }
        
        .building-card p {
            font-size: 0.9em;
            opacity: 0.8;
            margin-bottom: 15px;
        }
        
        .building-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
        }
        
        .building-btn:hover {
            background: #5a67d8;
        }
        
        .controls {
            display: flex;
            justify-content: center;
            gap: 15px;
            margin: 20px 0;
        }
        
        .control-btn {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 25px;
            cursor: pointer;
            font-size: 1em;
            transition: all 0.3s ease;
        }
        
        .control-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }
        
        /* 建筑信息面板 */
        .info-panel {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.9);
            padding: 30px;
            border-radius: 20px;
            width: 80%;
            max-width: 600px;
            display: none;
            z-index: 1000;
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .info-panel.active {
            display: block;
        }
        
        .info-panel h2 {
            font-size: 2em;
            margin-bottom: 15px;
            color: #667eea;
        }
        
        .close-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: none;
            color: white;
            border: none;
            font-size: 1.5em;
            cursor: pointer;
        }
        
        /* 返回按钮 */
        .back-btn {
            position: fixed;
            top: 20px;
            left: 20px;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 25px;
            text-decoration: none;
            cursor: pointer;
            font-size: 1em;
            z-index: 100;
            transition: all 0.3s ease;
        }
        
        .back-btn:hover {
            background: rgba(255, 255, 255, 0.3);
        }
        
        /* 建筑标签 */
        .building-label {
            position: absolute;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 5px 10px;
            border-radius: 10px;
            font-size: 0.9em;
            pointer-events: none;
            white-space: nowrap;
        }
        
        @media (max-width: 768px) {
            .main-title {
                font-size: 2.5em;
            }
            
            .three-container {
                height: 400px;
            }
            
            .building-selection {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <a href="index.html" class="back-btn">← 返回主页面</a>
    
    <div class="header">
        <h1 class="main-title">红尘灵境 3D预览</h1>
        <p class="subtitle">体验14座建筑的3D视觉预览</p>
    </div>
    
    <div class="container">
        <!-- 3D演示区域 -->
        <div class="demo-section">
            <h2 class="demo-title">建筑3D预览</h2>
            <div id="three-container" class="three-container">
                <!-- Three.js 渲染器将在这里显示 -->
            </div>
            
            <div class="controls">
                <button class="control-btn" onclick="rotateLeft()">↻ 左转</button>
                <button class="control-btn" onclick="rotateRight()">↺ 右转</button>
                <button class="control-btn" onclick="zoomIn()">+ 放大</button>
                <button class="control-btn" onclick="zoomOut()">- 缩小</button>
                <button class="control-btn" onclick="resetView()">🔄 重置</button>
            </div>
        </div>
        
        <!-- 建筑选择 -->
        <div class="demo-section">
            <h2 class="demo-title">14座完整建筑</h2>
            <div class="building-selection" id="building-list">
                <!-- 建筑列表将通过JavaScript动态生成 -->
            </div>
        </div>
    </div>
    
    <!-- 建筑详细信息面板 -->
    <div id="building-info" class="info-panel">
        <button class="close-btn" onclick="closeInfo()">×</button>
        <h2 id="building-name">建筑名称</h2>
        <p id="building-description">建筑描述</p>
        <div id="building-details"></div>
    </div>
    
    <!-- 加载Three.js库 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <script>
        // 建筑数据
        const buildings = [
            {
                id: 1,
                name: '灵槎津渡',
                description: '新手引导，初入灵境',
                color: 0x4CAF50,
                shape: 'gate'
            },
            {
                id: 2,
                name: '琅嬛福地',
                description: '技能图书馆，学习知识',
                color: 0x2196F3,
                shape: 'library'
            },
            {
                id: 3,
                name: '考工实训庐',
                description: '技能实操练习场',
                color: 0xFF9800,
                shape: 'workshop'
            },
            {
                id: 4,
                name: '百炼鉴心台',
                description: '技能考证，官方证书',
                color: 0xF44336,
                shape: 'platform'
            },
            {
                id: 5,
                name: '天工开物坊',
                description: '上传原创技能，AI帮你成书',
                color: 0x9C27B0,
                shape: 'workshop'
            },
            {
                id: 6,
                name: '神机枢阁',
                description: 'AI工具库，素材和算法中心',
                color: 0x00BCD4,
                shape: 'tower'
            },
            {
                id: 7,
                name: '群贤毕至堂',
                description: '社区投票，提议案，定规则',
                color: 0x8BC34A,
                shape: 'hall'
            },
            {
                id: 8,
                name: '荣光麟阁',
                description: '牛人排行榜，荣誉徽章墙',
                color: 0xFFC107,
                shape: 'tower'
            },
            {
                id: 9,
                name: '青鸟星驿',
                description: '给古人/未来写信，收集邮票',
                color: 0x607D8B,
                shape: 'gate'
            },
            {
                id: 10,
                name: '两仪墟市',
                description: '白天聊技能，晚上玩异能',
                color: 0x795548,
                shape: 'market'
            },
            {
                id: 11,
                name: '万象璇玑阁',
                description: '资源对接中心，找合作、拉赞助',
                color: 0x3F51B5,
                shape: 'tower'
            },
            {
                id: 12,
                name: '泉府通衢',
                description: '技能作品买卖，虚拟资产交易',
                color: 0xE91E63,
                shape: 'market'
            },
            {
                id: 13,
                name: '芥子藏虚',
                description: '我的个人主页，展示一切',
                color: 0x009688,
                shape: 'house'
            },
            {
                id: 14,
                name: '星枢问道台',
                description: '赛季挑战，冲榜拿大奖',
                color: 0xCDDC39,
                shape: 'platform'
            }
        ];
        
        // Three.js变量
        let scene, camera, renderer, controls;
        let selectedBuilding = null;
        let buildingObjects = [];
        
        // 初始化Three.js场景
        function initThreeJS() {
            // 创建场景
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x0a0a0a);
            
            // 创建相机
            camera = new THREE.PerspectiveCamera(
                60, 
                window.innerWidth / window.innerHeight, 
                0.1, 
                1000
            );
            camera.position.set(15, 10, 15);
            camera.lookAt(0, 0, 0);
            
            // 创建渲染器
            const container = document.getElementById('three-container');
            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(container.clientWidth, container.clientHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            container.appendChild(renderer.domElement);
            
            // 添加光源
            const ambientLight = new THREE.AmbientLight(0x404040, 0.6);
            scene.add(ambientLight);
            
            const directionalLight = new THREE.DirectionalLight(0xffffff, 1);
            directionalLight.position.set(10, 20, 10);
            scene.add(directionalLight);
            
            // 添加地面
            const groundGeometry = new THREE.PlaneGeometry(30, 30);
            const groundMaterial = new THREE.MeshStandardMaterial({ 
                color: 0x2c3e50,
                roughness: 0.8,
                metalness: 0.2
            });
            const ground = new THREE.Mesh(groundGeometry, groundMaterial);
            ground.rotation.x = -Math.PI / 2;
            ground.position.y = -0.5;
            scene.add(ground);
            
            // 添加网格辅助
            const gridHelper = new THREE.GridHelper(30, 30, 0x444444, 0x222222);
            scene.add(gridHelper);
            
            // 创建所有建筑
            createBuildings();
            
            // 开始动画循环
            animate();
        }
        
        // 创建14座建筑的3D表示
        function createBuildings() {
            const radius = 10;
            buildingObjects = [];
            
            buildings.forEach((building, index) => {
                const angle = (index / buildings.length) * Math.PI * 2;
                const x = Math.cos(angle) * radius;
                const z = Math.sin(angle) * radius;
                
                let geometry, material;
                
                // 根据建筑类型选择不同的几何体
                switch(building.shape) {
                    case 'gate':
                        geometry = new THREE.BoxGeometry(2, 4, 1);
                        break;
                    case 'library':
                        geometry = new THREE.BoxGeometry(3, 3, 4);
                        break;
                    case 'workshop':
                        geometry = new THREE.CylinderGeometry(1.5, 2, 3, 6);
                        break;
                    case 'platform':
                        geometry = new THREE.BoxGeometry(4, 0.5, 4);
                        break;
                    case 'tower':
                        geometry = new THREE.CylinderGeometry(1, 1, 6, 8);
                        break;
                    case 'hall':
                        geometry = new THREE.BoxGeometry(4, 2, 5);
                        break;
                    case 'market':
                        geometry = new THREE.BoxGeometry(3, 2.5, 3);
                        break;
                    case 'house':
                        geometry = new THREE.BoxGeometry(2, 2.5, 2);
                        break;
                    default:
                        geometry = new THREE.BoxGeometry(2, 3, 2);
                }
                
                material = new THREE.MeshStandardMaterial({ 
                    color: building.color,
                    roughness: 0.7,
                    metalness: 0.3
                });
                
                const mesh = new THREE.Mesh(geometry, material);
                mesh.position.set(x, 1.5, z);
                mesh.userData = building;
                scene.add(mesh);
                buildingObjects.push(mesh);
                
                // 添加标签
                const label = document.createElement('div');
                label.className = 'building-label';
                label.textContent = building.name;
                label.style.left = '50%';
                label.style.top = '50%';
                document.getElementById('three-container').appendChild(label);
            });
        }
        
        // 动画循环
        function animate() {
            requestAnimationFrame(animate);
            
            // 缓慢旋转场景
            scene.rotation.y += 0.002;
            
            // 更新建筑标签位置
            updateLabels();
            
            renderer.render(scene, camera);
        }
        
        // 更新标签位置
        function updateLabels() {
            // 这里可以实现标签跟随建筑移动
        }
        
        // 控制函数
        function rotateLeft() {
            scene.rotation.y += 0.2;
        }
        
        function rotateRight() {
            scene.rotation.y -= 0.2;
        }
        
        function zoomIn() {
            camera.position.multiplyScalar(0.9);
        }
        
        function zoomOut() {
            camera.position.multiplyScalar(1.1);
        }
        
        function resetView() {
            camera.position.set(15, 10, 15);
            camera.lookAt(0, 0, 0);
            scene.rotation.y = 0;
        }
        
        // 显示建筑信息
        function showBuildingInfo(building) {
            document.getElementById('building-name').textContent = building.name;
            document.getElementById('building-description').textContent = building.description;
            
            const details = document.getElementById('building-details');
            details.innerHTML = `
                <p><strong>功能寓意：</strong>${building.description}</p>
                <p><strong>建筑类型：</strong>${getBuildingType(building.shape)}</p>
                <p><strong>主要功能：</strong>${getBuildingFunction(building.id)}</p>
                <p><strong>技术阶段：</strong>阶段1 - 轻量3D期</p>
            `;
            
            document.getElementById('building-info').classList.add('active');
            
            // 在3D场景中高亮显示该建筑
            highlightBuilding(building.id);
        }
        
        function closeInfo() {
            document.getElementById('building-info').classList.remove('active');
            unhighlightAll();
        }
        
        function highlightBuilding(buildingId) {
            buildingObjects.forEach(mesh => {
                if (mesh.userData.id === buildingId) {
                    mesh.material.emissive = new THREE.Color(0x333333);
                } else {
                    mesh.material.emissive = new THREE.Color(0x000000);
                }
            });
        }
        
        function unhighlightAll() {
            buildingObjects.forEach(mesh => {
                mesh.material.emissive = new THREE.Color(0x000000);
            });
        }
        
        // 辅助函数
        function getBuildingType(shape) {
            const types = {
                'gate': '入口建筑',
                'library': '知识建筑',
                'workshop': '实训建筑',
                'platform': '考核建筑',
                'tower': '高层建筑',
                'hall': '集会建筑',
                'market': '市场建筑',
                'house': '个人建筑'
            };
            return types[shape] || '通用建筑';
        }
        
        function getBuildingFunction(id) {
            const functions = {
                1: '新手引导、角色创建',
                2: '技能学习、知识检索',
                3: '实操练习、技能训练',
                4: '考核认证、证书发放',
                5: '内容创作、AI辅助',
                6: 'AI工具、算法中心',
                7: '社区治理、投票决策',
                8: '荣誉展示、排行榜',
                9: '时空通信、邮件系统',
                10: '社交互动、市场交易',
                11: '资源对接、合作寻找',
                12: '经济交易、资产流通',
                13: '个人主页、数据展示',
                14: '赛季挑战、竞赛活动'
            };
            return functions[id] || '多功能复合建筑';
        }
        
        // 初始化建筑选择列表
        function initBuildingList() {
            const container = document.getElementById('building-list');
            buildings.forEach(building => {
                const card = document.createElement('div');
                card.className = 'building-card';
                card.innerHTML = `
                    <h3>${building.name}</h3>
                    <p>${building.description}</p>
                    <button class="building-btn" onclick="showBuildingInfo(${JSON.stringify(building).replace(/"/g, '&quot;')})">
                        查看详情
                    </button>
                `;
                container.appendChild(card);
            });
        }
        
        // 窗口大小变化时调整渲染器
        window.addEventListener('resize', () => {
            const container = document.getElementById('three-container');
            camera.aspect = container.clientWidth / container.clientHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(container.clientWidth, container.clientHeight);
        });
        
        // 初始化
        window.addEventListener('load', () => {
            initThreeJS();
            initBuildingList();
        });
        
        // 点击3D场景中的建筑
        window.addEventListener('click', (event) => {
            const container = document.getElementById('three-container');
            const rect = container.getBoundingClientRect();
            
            const mouse = {
                x: ((event.clientX - rect.left) / container.clientWidth) * 2 - 1,
                y: -((event.clientY - rect.top) / container.clientHeight) * 2 + 1
            };
            
            // 这里可以添加射线检测点击建筑的功能
        });
    </script>
</body>
</html>

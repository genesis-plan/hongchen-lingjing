<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>灵槎津渡 - 入口引导 | 红尘灵境</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'PingFang SC', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
        }
        
        .auth-container {
            width: 100%;
            max-width: 400px;
            padding: 20px;
        }
        
        .auth-box {
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            padding: 40px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        .logo {
            text-align: center;
            margin-bottom: 30px;
        }
        
        .logo h1 {
            font-size: 28px;
            background: linear-gradient(90deg, #e94560, #ff6b9d);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .logo p {
            color: rgba(255,255,255,0.6);
            font-size: 14px;
            margin-top: 10px;
        }
        
        .tabs {
            display: flex;
            margin-bottom: 30px;
        }
        
        .tab {
            flex: 1;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            color: rgba(255,255,255,0.6);
            transition: all 0.3s;
        }
        
        .tab.active {
            color: #e94560;
            border-bottom-color: #e94560;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: rgba(255,255,255,0.8);
            font-size: 14px;
        }
        
        .form-group input, .form-group select {
            width: 100%;
            padding: 15px;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.1);
            color: #fff;
            font-size: 16px;
        }
        
        .form-group input::placeholder {
            color: rgba(255,255,255,0.5);
        }
        
        .btn {
            width: 100%;
            padding: 15px;
            border-radius: 10px;
            border: none;
            background: linear-gradient(90deg, #e94560, #ff6b9d);
            color: #fff;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(233, 69, 96, 0.4);
        }
        
        .form-footer {
            text-align: center;
            margin-top: 20px;
            color: rgba(255,255,255,0.6);
            font-size: 14px;
        }
        
        .form-footer a {
            color: #e94560;
            text-decoration: none;
        }
        
        .identity-select {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .identity-option {
            flex: 1;
            padding: 15px;
            text-align: center;
            border-radius: 10px;
            border: 1px solid rgba(255,255,255,0.2);
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .identity-option:hover {
            border-color: #e94560;
        }
        
        .identity-option.selected {
            border-color: #e94560;
            background: rgba(233, 69, 96, 0.1);
        }
        
        .identity-option .icon {
            font-size: 24px;
            margin-bottom: 5px;
        }
        
        .identity-option .label {
            font-size: 14px;
        }
        
        .hidden { display: none; }
        
        .message {
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            text-align: center;
        }
        
        .message.error {
            background: rgba(239, 68, 68, 0.2);
            border: 1px solid rgba(239, 68, 68, 0.5);
        }
        
        .message.success {
            background: rgba(34, 197, 94, 0.2);
            border: 1px solid rgba(34, 197, 94, 0.5);
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-box">
            <div class="logo">
                <h1>🚢 灵槎津渡</h1>
                <p>《博物志》通天之筏 - 开启你的技能传承之旅</p>
            </div>
            
            <div class="tabs">
                <div class="tab active" onclick="showTab('login')">登录</div>
                <div class="tab" onclick="showTab('register')">注册</div>
            </div>
            
            <div id="message"></div>
            
            <!-- 登录表单 -->
            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label>用户名</label>
                    <input type="text" name="username" placeholder="请输入用户名" required>
                </div>
                <div class="form-group">
                    <label>密码</label>
                    <input type="password" name="password" placeholder="请输入密码" required>
                </div>
                <button type="submit" class="btn">登录</button>
                <div class="form-footer">
                    还没有账号？<a href="#" onclick="showTab('register')">立即注册</a>
                </div>
            </form>
            
            <!-- 注册表单 -->
            <form id="registerForm" class="hidden" onsubmit="handleRegister(event)">
                <div class="form-group">
                    <label>用户名</label>
                    <input type="text" name="username" placeholder="请输入用户名" required>
                </div>
                <div class="form-group">
                    <label>密码</label>
                    <input type="password" name="password" placeholder="请输入密码" required>
                </div>
                <div class="form-group">
                    <label>确认密码</label>
                    <input type="password" name="confirmPassword" placeholder="请再次输入密码" required>
                </div>
                
                <label style="margin-bottom: 10px; display: block; color: rgba(255,255,255,0.8);">
                    选择你的身份
                </label>
                <div class="identity-select">
                    <div class="identity-option selected" data-identity="learner" onclick="selectIdentity(this)">
                        <div class="icon">📚</div>
                        <div class="label">学徒</div>
                    </div>
                    <div class="identity-option" data-identity="master" onclick="selectIdentity(this)">
                        <div class="icon">🎓</div>
                        <div class="label">师傅</div>
                    </div>
                    <div class="identity-option" data-identity="both" onclick="selectIdentity(this)">
                        <div class="icon">🔄</div>
                        <div class="label">两者</div>
                    </div>
                </div>
                
                <button type="submit" class="btn">注册</button>
                <div class="form-footer">
                    已有账号？<a href="#" onclick="showTab('login')">立即登录</a>
                </div>
            </form>
        </div>
    </div>
    
    <script>
        const API_BASE = 'https://h4-6g0tfhaqc1bbcdb5-1409755229.tcloudbaseapp.com';
        let selectedIdentity = 'learner';
        
        function showTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelector(`.tab:nth-child(${tab === 'login' ? 1 : 2})`).classList.add('active');
            
            document.getElementById('loginForm').classList.toggle('hidden', tab !== 'login');
            document.getElementById('registerForm').classList.toggle('hidden', tab !== 'register');
            document.getElementById('message').innerHTML = '';
        }
        
        function selectIdentity(el) {
            document.querySelectorAll('.identity-option').forEach(o => o.classList.remove('selected'));
            el.classList.add('selected');
            selectedIdentity = el.dataset.identity;
        }
        
        function showMessage(type, text) {
            document.getElementById('message').innerHTML = 
                `<div class="message ${type}">${text}</div>`;
        }
        
        async function handleLogin(e) {
            e.preventDefault();
            const form = e.target;
            const data = {
                username: form.username.value,
                password: form.password.value
            };
            
            try {
                const res = await fetch(API_BASE + '/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                const result = await res.json();
                
                if (result.success) {
                    localStorage.setItem('token', result.token);
                    localStorage.setItem('user', JSON.stringify(result.user));
                    showMessage('success', '登录成功！跳转中...');
                    setTimeout(() => window.location.href = '/profile', 1000);
                } else {
                    showMessage('error', result.message || '登录失败');
                }
            } catch (err) {
                showMessage('error', '网络错误，请稍后重试');
            }
        }
        
        async function handleRegister(e) {
            e.preventDefault();
            const form = e.target;
            
            if (form.password.value !== form.confirmPassword.value) {
                showMessage('error', '两次密码输入不一致');
                return;
            }
            
            const data = {
                username: form.username.value,
                password: form.password.value,
                identity: selectedIdentity
            };
            
            try {
                const res = await fetch(API_BASE + '/register', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(data)
                });
                const result = await res.json();
                
                if (result.success) {
                    showMessage('success', '注册成功！请登录');
                    setTimeout(() => showTab('login'), 1500);
                } else {
                    showMessage('error', result.message || '注册失败');
                }
            } catch (err) {
                showMessage('error', '网络错误，请稍后重试');
            }
        }
    </script>
</body>
</html>

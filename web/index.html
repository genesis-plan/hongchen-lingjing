<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>红尘灵境 - 踏入你的修行之路</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="smart-assistant.css">
</head>
<body>
    <!-- 落地页 -->
    <div id="landing-page" class="page active">
        <div class="landing-container">
            <div class="hero-section">
                <h1 class="main-title">红尘灵境</h1>
                <p class="subtitle">踏入你的修行之路，追寻大道真谛</p>
                <button class="cta-button" onclick="enterApp()">进入灵境</button>
            </div>

            <div class="legal-links">
                <a href="privacy-policy.html" class="legal-link">隐私政策</a>
                <span class="separator">|</span>
                <a href="terms-of-service.html" class="legal-link">服务条款</a>
            </div>

            <div class="auth-buttons">
                <button class="auth-btn" onclick="window.location.href='login.html'">登录</button>
                <button class="auth-btn primary" onclick="window.location.href='register.html'">注册</button>
            </div>

            <div class="features-grid">
                <div class="feature-card">
                    <div class="feature-icon">📚</div>
                    <h3>琅嬛藏书</h3>
                    <p>海量知识等你探索</p>
                </div>
                <div class="feature-card">
                    <div class="feature-icon">🎯</div>
                    <h3>修炼实训</h3>
                    <p>实战演练提升能力</p>
                </div>
                <div class="feature-card">
                    <div class="feature-icon">🏆</div>
                    <h3>荣誉殿堂</h3>
                    <p>成就徽章见证成长</p>
                </div>
                <div class="feature-card">
                    <div class="feature-icon">🤝</div>
                    <h3>同修空间</h3>
                    <p>与同道交流心得</p>
                </div>
            </div>
        </div>
    </div>

    <!-- 主页面 -->
    <div id="home-page" class="page">
        <div class="app-container">
            <!-- 顶部导航 -->
            <nav class="top-nav">
                <div class="nav-title">红尘灵境</div>
                <div class="nav-user">
                    <span id="user-display">未登录</span>
                </div>
            </nav>

            <!-- 主要内容区 -->
            <main class="main-content">
                <section class="welcome-section">
                    <h2>欢迎来到红尘灵境</h2>
                    <p>在这里，每一次学习都是一次修炼，每一次进步都是一次突破</p>
                </section>

                <section class="skills-section">
                    <h3>当前技能</h3>
                    <div id="skills-list" class="skills-grid">
                        <!-- 动态加载技能列表 -->
                    </div>
                </section>

                <section class="quick-actions">
                    <h3>快捷入口</h3>
                    <div class="action-buttons">
                        <button class="action-btn" onclick="window.location.href='courses.html'">
                            <span>📚</span>课程中心
                        </button>
                        <button class="action-btn" onclick="window.location.href='lingcha-jindu-onboarding.html'">
                            <span>🚀</span>新手引导
                        </button>
                        <button class="action-btn" onclick="navigateTo('library')">
                            <span>📖</span>琅嬛藏书
                        </button>
                        <button class="action-btn" onclick="navigateTo('practice')">
                            <span>💪</span>修炼实训
                        </button>
                        <button class="action-btn" onclick="navigateTo('honor')">
                            <span>🏆</span>荣誉殿堂
                        </button>
                        <button class="action-btn" onclick="navigateTo('community')">
                            <span>👥</span>同修社区
                        </button>
                        <button class="action-btn" onclick="window.location.href='threejs-demo.html'">
                            <span>🎮</span>3D预览
                        </button>
                    </div>
                </section>
            </main>

            <!-- 底部导航 -->
            <nav class="bottom-nav">
                <button class="nav-item active" onclick="navigateTo('home')">
                    <span>🏠</span>
                    <span>灵境</span>
                </button>
                <button class="nav-item" onclick="navigateTo('library')">
                    <span>📚</span>
                    <span>琅嬛</span>
                </button>
                <button class="nav-item" onclick="navigateTo('practice')">
                    <span>🎯</span>
                    <span>实训</span>
                </button>
                <button class="nav-item" onclick="navigateTo('honor')">
                    <span>🏆</span>
                    <span>荣誉</span>
                </button>
                <button class="nav-item" onclick="navigateTo('space')">
                    <span>👤</span>
                    <span>空间</span>
                </button>
            </nav>

            <!-- 法律链接 -->
            <div class="footer-legal">
                <a href="privacy-policy.html" class="footer-link">隐私政策</a>
                <span class="footer-separator">|</span>
                <a href="terms-of-service.html" class="footer-link">服务条款</a>
                <span class="footer-separator">|</span>
                <a href="#" onclick="showAgeVerification()" class="footer-link">年龄验证</a>
            </div>
        </div>
    </div>

    <!-- 琅嬛藏书页 -->
    <div id="library-page" class="page">
        <div class="app-container">
            <nav class="top-nav">
                <button class="back-btn" onclick="navigateTo('home')">← 返回</button>
                <div class="nav-title">琅嬛藏书</div>
            </nav>
            <main class="main-content">
                <div class="search-bar">
                    <input type="text" id="library-search" placeholder="搜索知识..." oninput="searchLibrary()">
                </div>
                <div id="library-content" class="content-grid">
                    <!-- 动态加载内容 -->
                </div>
            </main>
        </div>
    </div>

    <!-- 修炼实训页 -->
    <div id="practice-page" class="page">
        <div class="app-container">
            <nav class="top-nav">
                <button class="back-btn" onclick="navigateTo('home')">← 返回</button>
                <div class="nav-title">修炼实训</div>
            </nav>
            <main class="main-content">
                <div id="practice-list" class="practice-grid">
                    <!-- 动态加载实训项目 -->
                </div>
            </main>
        </div>
    </div>

    <!-- 荣誉殿堂页 -->
    <div id="honor-page" class="page">
        <div class="app-container">
            <nav class="top-nav">
                <button class="back-btn" onclick="navigateTo('home')">← 返回</button>
                <div class="nav-title">荣誉殿堂</div>
            </nav>
            <main class="main-content">
                <div id="honors-list" class="honors-grid">
                    <!-- 动态加载荣誉 -->
                </div>
            </main>
        </div>
    </div>

    <!-- 个人空间页 -->
    <div id="space-page" class="page">
        <div class="app-container">
            <nav class="top-nav">
                <button class="back-btn" onclick="navigateTo('home')">← 返回</button>
                <div class="nav-title">个人空间</div>
            </nav>
            <main class="main-content">
                <div class="user-profile">
                    <div class="avatar">👤</div>
                    <h2 id="profile-name">修行者</h2>
                    <p id="profile-level">境界: 筑基期</p>
                </div>
                <div class="stats-grid">
                    <div class="stat-card">
                        <div class="stat-value" id="stat-skill-count">0</div>
                        <div class="stat-label">掌握技能</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="stat-practice-count">0</div>
                        <div class="stat-label">完成实训</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-value" id="stat-honor-count">0</div>
                        <div class="stat-label">获得荣誉</div>
                    </div>
                </div>
            </main>
        </div>
    </div>

    <script src="app.js"></script>
    <script src="smart-assistant-integration.js"></script>
    <script>
        // 页面加载完成后初始化智能助手
        document.addEventListener('DOMContentLoaded', function() {
            // 初始化智能助手UI
            window.smartAssistantUI = new SmartAssistantUI('app-container', {
                assistantType: 'skill',
                // 配置智能体平台API信息（从智能体平台获取后填写）
                appId: '',  // 需要从智能体平台获取
                apiKey: '', // 需要从智能体平台获取
                enableVoice: false,
                enableHistory: true
            });
            
            console.log('红尘灵境智能助手已初始化');
        });
    </script>
</body>
</html>

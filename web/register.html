<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册 - 红尘灵境</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .register-container {
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .register-card {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            animation: fadeInUp 0.5s ease-out;
        }

        .register-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .register-header h1 {
            color: #667eea;
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .register-header p {
            color: #666;
            font-size: 1.1em;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            color: #333;
            font-weight: bold;
            margin-bottom: 8px;
        }

        .form-group input,
        .form-group select {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1em;
            transition: all 0.3s ease;
        }

        .form-group input:focus,
        .form-group select:focus {
            border-color: #667eea;
            outline: none;
            box-shadow: 0 0 10px rgba(102, 126, 234, 0.2);
        }

        .agreement-section {
            background: #f9f9f9;
            padding: 20px;
            border-radius: 10px;
            margin-bottom: 25px;
        }

        .agreement-item {
            margin-bottom: 15px;
        }

        .agreement-item:last-child {
            margin-bottom: 0;
        }

        .checkbox-wrapper {
            display: flex;
            align-items: flex-start;
            gap: 10px;
            cursor: pointer;
        }

        .checkbox-wrapper input[type="checkbox"] {
            width: 20px;
            height: 20px;
            margin-top: 3px;
            cursor: pointer;
        }

        .checkbox-wrapper .label-text {
            color: #555;
            line-height: 1.6;
            flex: 1;
        }

        .checkbox-wrapper .label-text a {
            color: #667eea;
            text-decoration: none;
            font-weight: bold;
        }

        .checkbox-wrapper .label-text a:hover {
            text-decoration: underline;
        }

        .age-confirmation {
            background: #fff3cd;
            padding: 15px;
            border-left: 4px solid #ffc107;
            border-radius: 5px;
            margin-bottom: 25px;
        }

        .age-confirmation .checkbox-wrapper {
            align-items: center;
        }

        .register-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.2em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .register-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .register-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .login-link {
            text-align: center;
            margin-top: 20px;
            color: #666;
        }

        .login-link a {
            color: #667eea;
            text-decoration: none;
            font-weight: bold;
        }

        .login-link a:hover {
            text-decoration: underline;
        }

        .back-link {
            display: inline-block;
            margin-bottom: 20px;
            color: white;
            text-decoration: none;
            font-weight: bold;
        }

        .back-link:hover {
            text-decoration: underline;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .error-message {
            color: #dc3545;
            font-size: 0.9em;
            margin-top: 5px;
            display: none;
        }

        .error-message.show {
            display: block;
        }
    </style>
</head>
<body>
    <div class="register-container">
        <div class="register-card">
            <div class="register-header">
                <h1>加入红尘灵境</h1>
                <p>开始你的修行之路</p>
            </div>

            <form id="registerForm" onsubmit="handleRegister(event)">
                <!-- 年龄确认（必需） -->
                <div class="age-confirmation">
                    <div class="checkbox-wrapper">
                        <input type="checkbox" id="ageConfirm" required>
                        <label for="ageConfirm" class="label-text">
                            <strong>我确认已年满14周岁</strong><br>
                            <small>如您未满14周岁，请在监护人指导下使用本应用</small>
                        </label>
                    </div>
                </div>

                <!-- 用户名 -->
                <div class="form-group">
                    <label for="username">用户名 *</label>
                    <input type="text" id="username" required
                           pattern="[a-zA-Z0-9_\u4e00-\u9fa5]{3,20}"
                           title="用户名3-20个字符，支持中文、字母、数字、下划线"
                           placeholder="请输入用户名">
                    <div class="error-message" id="usernameError"></div>
                </div>

                <!-- 密码 -->
                <div class="form-group">
                    <label for="password">密码 *</label>
                    <input type="password" id="password" required
                           pattern=".{6,20}"
                           title="密码6-20个字符"
                           placeholder="请输入密码（6-20个字符）">
                    <div class="error-message" id="passwordError"></div>
                </div>

                <!-- 确认密码 -->
                <div class="form-group">
                    <label for="confirmPassword">确认密码 *</label>
                    <input type="password" id="confirmPassword" required
                           placeholder="请再次输入密码">
                    <div class="error-message" id="confirmPasswordError"></div>
                </div>

                <!-- 邮箱 -->
                <div class="form-group">
                    <label for="email">邮箱</label>
                    <input type="email" id="email"
                           placeholder="请输入邮箱（可选，用于找回密码）">
                </div>

                <!-- 协议确认 -->
                <div class="agreement-section">
                    <div class="agreement-item">
                        <div class="checkbox-wrapper">
                            <input type="checkbox" id="agreeTerms" required>
                            <label for="agreeTerms" class="label-text">
                                我已阅读并同意
                                <a href="terms-of-service.html" target="_blank">《服务条款》</a>
                                和
                                <a href="privacy-policy.html" target="_blank">《隐私政策》</a>
                            </label>
                        </div>
                    </div>
                    <div class="agreement-item">
                        <div class="checkbox-wrapper">
                            <input type="checkbox" id="agreeMarketing">
                            <label for="agreeMarketing" class="label-text">
                                我同意接收营销通知（可随时取消）
                            </label>
                        </div>
                    </div>
                </div>

                <button type="submit" class="register-btn" id="registerBtn">
                    立即注册
                </button>
            </form>

            <div class="login-link">
                已有账号？<a href="index.html">立即登录</a>
            </div>
        </div>
    </div>

    <script>
        // 记录用户同意时间
        function recordAgreement() {
            const now = new Date().toISOString();
            localStorage.setItem('agreementTime', now);
            console.log('用户协议同意时间:', now);
        }

        // 表单验证
        function validateForm() {
            let isValid = true;

            // 验证用户名
            const username = document.getElementById('username').value;
            const usernameError = document.getElementById('usernameError');
            if (username.length < 3) {
                usernameError.textContent = '用户名至少3个字符';
                usernameError.classList.add('show');
                isValid = false;
            } else {
                usernameError.classList.remove('show');
            }

            // 验证密码
            const password = document.getElementById('password').value;
            const passwordError = document.getElementById('passwordError');
            if (password.length < 6) {
                passwordError.textContent = '密码至少6个字符';
                passwordError.classList.add('show');
                isValid = false;
            } else {
                passwordError.classList.remove('show');
            }

            // 验证确认密码
            const confirmPassword = document.getElementById('confirmPassword').value;
            const confirmPasswordError = document.getElementById('confirmPasswordError');
            if (password !== confirmPassword) {
                confirmPasswordError.textContent = '两次输入的密码不一致';
                confirmPasswordError.classList.add('show');
                isValid = false;
            } else {
                confirmPasswordError.classList.remove('show');
            }

            // 验证协议确认
            const agreeTerms = document.getElementById('agreeTerms').checked;
            if (!agreeTerms) {
                alert('请阅读并同意服务条款和隐私政策');
                isValid = false;
            }

            // 验证年龄确认
            const ageConfirm = document.getElementById('ageConfirm').checked;
            if (!ageConfirm) {
                alert('请确认您已年满14周岁');
                isValid = false;
            }

            return isValid;
        }

        // 处理注册
        function handleRegister(event) {
            event.preventDefault();

            if (!validateForm()) {
                return;
            }

            // 记录协议同意时间
            recordAgreement();

            // 收集表单数据
            const formData = {
                username: document.getElementById('username').value,
                password: document.getElementById('password').value,
                email: document.getElementById('email').value,
                agreeMarketing: document.getElementById('agreeMarketing').checked,
                agreementTime: localStorage.getItem('agreementTime'),
                registrationDate: new Date().toISOString()
            };

            console.log('注册数据:', formData);

            // TODO: 调用后端API完成注册
            // 这里先保存到本地存储模拟
            localStorage.setItem('user_' + formData.username, JSON.stringify(formData));

            alert('注册成功！欢迎加入红尘灵境！');
            window.location.href = 'index.html';
        }

        // 实时验证密码匹配
        document.getElementById('confirmPassword').addEventListener('input', function() {
            const password = document.getElementById('password').value;
            const confirmPassword = this.value;
            const error = document.getElementById('confirmPasswordError');

            if (confirmPassword && password !== confirmPassword) {
                error.textContent = '两次输入的密码不一致';
                error.classList.add('show');
            } else {
                error.classList.remove('show');
            }
        });

        // 实时验证用户名
        document.getElementById('username').addEventListener('input', function() {
            const error = document.getElementById('usernameError');
            if (this.value.length > 0 && this.value.length < 3) {
                error.textContent = '用户名至少3个字符';
                error.classList.add('show');
            } else {
                error.classList.remove('show');
            }
        });
    </script>
</body>
</html>

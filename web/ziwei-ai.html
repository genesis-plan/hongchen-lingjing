<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>紫薇数字人 - 智能AI导师 | 红尘灵境</title>
    <style>
        :root {
            --primary: #667eea;
            --secondary: #764ba2;
            --accent: #f093fb;
            --dark: #1a1a2e;
            --light: #ffffff;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'PingFang SC', 'Microsoft YaHei', -apple-system, BlinkMacSystemFont, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            color: #fff;
            display: flex;
            flex-direction: column;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            flex: 1;
        }
        
        /* 顶部导航 */
        .top-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px;
            background: rgba(26, 26, 46, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .logo {
            font-size: 24px;
            font-weight: bold;
            background: linear-gradient(90deg, #667eea, #764ba2, #f093fb);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .back-link {
            color: rgba(255, 255, 255, 0.8);
            text-decoration: none;
            transition: color 0.3s;
        }
        
        .back-link:hover {
            color: #fff;
        }
        
        /* 主内容区 */
        .main-content {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 40px;
            padding: 40px 0;
            height: calc(100vh - 100px);
        }
        
        /* 左侧：紫薇展示 */
        .ai-showcase {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 40px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .ai-avatar {
            font-size: 120px;
            margin-bottom: 20px;
            animation: float 3s ease-in-out infinite;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }
        
        .ai-name {
            font-size: 32px;
            font-weight: bold;
            margin-bottom: 10px;
            background: linear-gradient(90deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .ai-title {
            font-size: 18px;
            color: rgba(255, 255, 255, 0.7);
            margin-bottom: 20px;
        }
        
        .ai-status {
            display: flex;
            gap: 20px;
            margin-top: 20px;
        }
        
        .status-item {
            text-align: center;
        }
        
        .status-item .value {
            font-size: 24px;
            font-weight: bold;
            color: #667eea;
        }
        
        .status-item .label {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.6);
        }
        
        /* 右侧：对话界面 */
        .chat-interface {
            display: flex;
            flex-direction: column;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            overflow: hidden;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .chat-header {
            padding: 20px;
            background: rgba(102, 126, 234, 0.2);
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
            gap: 15px;
        }
        
        .chat-header-avatar {
            font-size: 40px;
        }
        
        .chat-header-info h3 {
            font-size: 18px;
            margin-bottom: 5px;
        }
        
        .chat-header-info p {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.6);
        }
        
        .online-status {
            display: inline-block;
            width: 10px;
            height: 10px;
            background: #00ff00;
            border-radius: 50%;
            margin-left: 5px;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .chat-messages {
            flex: 1;
            padding: 20px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }
        
        .message {
            max-width: 80%;
            padding: 15px 20px;
            border-radius: 20px;
            animation: fadeIn 0.3s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .message.ai {
            align-self: flex-start;
            background: rgba(102, 126, 234, 0.2);
            border-bottom-left-radius: 5px;
        }
        
        .message.user {
            align-self: flex-end;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-bottom-right-radius: 5px;
        }
        
        .chat-input-area {
            padding: 20px;
            background: rgba(26, 26, 46, 0.5);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            gap: 10px;
        }
        
        .chat-input {
            flex: 1;
            padding: 15px 20px;
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 30px;
            background: rgba(255, 255, 255, 0.05);
            color: #fff;
            font-size: 16px;
            outline: none;
            transition: all 0.3s;
        }
        
        .chat-input:focus {
            border-color: #667eea;
            background: rgba(255, 255, 255, 0.1);
        }
        
        .chat-input::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }
        
        .chat-send-btn {
            width: 50px;
            height: 50px;
            border: none;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            font-size: 20px;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .chat-send-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        
        .chat-send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        /* 快捷问题 */
        .quick-questions {
            padding: 15px 20px;
            background: rgba(26, 26, 46, 0.3);
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        
        .quick-question {
            padding: 8px 16px;
            border-radius: 20px;
            background: rgba(102, 126, 234, 0.2);
            color: rgba(255, 255, 255, 0.8);
            border: 1px solid rgba(102, 126, 234, 0.3);
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }
        
        .quick-question:hover {
            background: rgba(102, 126, 234, 0.4);
            border-color: #667eea;
            color: #fff;
        }
        
        /* 响应式 */
        @media (max-width: 768px) {
            .main-content {
                grid-template-columns: 1fr;
                height: auto;
            }
            
            .ai-showcase {
                padding: 30px;
            }
            
            .ai-avatar {
                font-size: 80px;
            }
            
            .ai-name {
                font-size: 24px;
            }
            
            .chat-interface {
                height: 500px;
            }
        }
        
        /* 滚动条样式 */
        .chat-messages::-webkit-scrollbar {
            width: 6px;
        }
        
        .chat-messages::-webkit-scrollbar-track {
            background: rgba(255, 255, 255, 0.05);
        }
        
        .chat-messages::-webkit-scrollbar-thumb {
            background: rgba(102, 126, 234, 0.5);
            border-radius: 3px;
        }
        
        .chat-messages::-webkit-scrollbar-thumb:hover {
            background: rgba(102, 126, 234, 0.8);
        }
    </style>
</head>
<body>
    <div class="top-nav">
        <a href="index-v2.html" class="back-link">← 返回首页</a>
        <div class="logo">💜 紫薇数字人</div>
        <div></div>
    </div>
    
    <div class="container">
        <div class="main-content">
            <!-- 左侧：紫薇展示 -->
            <div class="ai-showcase">
                <div class="ai-avatar">💜</div>
                <h1 class="ai-name">紫薇</h1>
                <p class="ai-title">红尘灵境最高数字人 · 智能AI导师</p>
                
                <div class="ai-status">
                    <div class="status-item">
                        <div class="value" id="responseTime">0.5s</div>
                        <div class="label">响应速度</div>
                    </div>
                    <div class="status-item">
                        <div class="value" id="confidence">98%</div>
                        <div class="label">准确度</div>
                    </div>
                    <div class="status-item">
                        <div class="value" id="learningProgress">42%</div>
                        <div class="label">学习进度</div>
                    </div>
                </div>
                
                <div style="margin-top: 30px; text-align: center; color: rgba(255,255,255,0.6);">
                    <p>基于多模态AI和Agentic智能体框架</p>
                    <p>24小时在线，随时为你服务</p>
                </div>
            </div>
            
            <!-- 右侧：对话界面 -->
            <div class="chat-interface">
                <div class="chat-header">
                    <div class="chat-header-avatar">💜</div>
                    <div class="chat-header-info">
                        <h3>紫薇 <span class="online-status"></span></h3>
                        <p>智能AI导师 · 在线</p>
                    </div>
                </div>
                
                <div class="chat-messages" id="chatMessages">
                    <div class="message ai">
                        你好！我是紫薇，红尘灵境的智能AI导师。很高兴见到你！🎉
                    </div>
                    <div class="message ai">
                        我可以帮助你：
                        <br>• 制定个性化学习计划
                        <br>• 解答技能学习问题
                        <br>• 推荐学习资源
                        <br>• 陪伴你成长的每一步
                    </div>
                    <div class="message ai">
                        请问有什么可以帮助你的吗？😊
                    </div>
                </div>
                
                <div class="quick-questions">
                    <span class="quick-question" onclick="askQuestion('我想学习编程')">我想学习编程</span>
                    <span class="quick-question" onclick="askQuestion('推荐一些学习资源')">推荐学习资源</span>
                    <span class="quick-question" onclick="askQuestion('如何制定学习计划')">制定学习计划</span>
                    <span class="quick-question" onclick="askQuestion('今天学什么好')">今天学什么</span>
                </div>
                
                <div class="chat-input-area">
                    <input type="text" class="chat-input" id="chatInput" placeholder="输入你的问题..." onkeypress="handleKeyPress(event)">
                    <button class="chat-send-btn" id="sendBtn" onclick="sendMessage()">➤</button>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        // 对话历史
        let conversationHistory = [];
        
        // 模拟AI回复
        function generateAIResponse(userMessage) {
            const responses = {
                '我想学习编程': '太棒了！编程是一项非常重要的技能。我建议你从以下路径开始：<br><br>🎯 初学者路径：Python → Web开发<br>🎯 进阶路径：JavaScript → 前端框架<br>🎯 高级路径：后端开发 → 全栈工程师<br><br>我可以为你制定详细的3个月学习计划，需要吗？',
                
                '推荐一些学习资源': '当然！根据红尘灵境的资源库，我为你推荐：<br><br>📚 《编程入门指南》- 适合初学者<br>📚 《Python实战项目》- 动手实践<br>📚 《前端开发从入门到精通》- 系统学习<br>📚 《算法与数据结构》- 提升能力<br><br>需要我帮你生成个性化学习路径吗？',
                
                '如何制定学习计划': '制定学习计划，我会考虑以下几个因素：<br><br>📊 你的基础水平<br>⏰ 可用的学习时间<br>🎯 学习目标和时间节点<br>📈 学习进度跟踪<br><br>让我先了解一下你的情况：<br>1. 你现在的编程基础如何？<br>2. 每天能投入多少时间学习？',
                
                '今天学什么': '根据你的学习进度和当前热点，我建议今天学习：<br><br>🔥 热门推荐：React Hooks<br>📈 必学技能：Git版本控制<br>💡 实战项目：个人网站开发<br><br>这些技能在2026年非常热门，学会了能快速提升你的竞争力！要开始学习吗？'
            };
            
            // 简单的关键词匹配
            for (let key in responses) {
                if (userMessage.includes(key)) {
                    return responses[key];
                }
            }
            
            // 默认回复
            return `我理解你的问题：${userMessage}<br><br>作为智能AI导师，我可以帮助你解答各类学习问题，制定个性化学习计划，推荐学习资源。<br><br>让我为你生成更详细的解答...<br><br>💡 提示：你可以问我关于技能学习、学习计划、资源推荐等问题。`;
        }
        
        // 发送消息
        function sendMessage() {
            const input = document.getElementById('chatInput');
            const message = input.value.trim();
            
            if (!message) return;
            
            // 添加用户消息
            addMessage('user', message);
            
            // 清空输入框
            input.value = '';
            
            // 禁用发送按钮
            document.getElementById('sendBtn').disabled = true;
            
            // 模拟AI思考和回复
            setTimeout(() => {
                const aiResponse = generateAIResponse(message);
                addMessage('ai', aiResponse);
                document.getElementById('sendBtn').disabled = false;
                
                // 更新状态
                updateStats();
            }, 500 + Math.random() * 1000);
        }
        
        // 添加消息到聊天界面
        function addMessage(type, content) {
            const chatMessages = document.getElementById('chatMessages');
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${type}`;
            messageDiv.innerHTML = content;
            chatMessages.appendChild(messageDiv);
            
            // 滚动到底部
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }
        
        // 快捷问题
        function askQuestion(question) {
            document.getElementById('chatInput').value = question;
            sendMessage();
        }
        
        // 处理回车键
        function handleKeyPress(event) {
            if (event.key === 'Enter') {
                sendMessage();
            }
        }
        
        // 更新统计数据
        function updateStats() {
            const responseTime = (0.3 + Math.random() * 0.5).toFixed(1);
            const confidence = (95 + Math.random() * 5).toFixed(0);
            
            document.getElementById('responseTime').textContent = responseTime + 's';
            document.getElementById('confidence').textContent = confidence + '%';
        }
        
        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('chatInput').focus();
        });
    </script>
</body>
</html>

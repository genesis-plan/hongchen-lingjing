<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>琅嬛藏书 - 红尘灵境</title>
    <link rel="stylesheet" href="../styles.css">
</head>
<body>
    <div class="app-container">
        <nav class="top-nav">
            <button class="back-btn" onclick="history.back()">← 返回</button>
            <div class="nav-title">琅嬛藏书</div>
        </nav>
        <main class="main-content">
            <div class="search-bar">
                <input type="text" id="library-search" placeholder="搜索知识..." oninput="searchLibrary()">
            </div>
            <div class="filter-tabs">
                <button class="filter-tab active" onclick="filterContent('all')">全部</button>
                <button class="filter-tab" onclick="filterContent('basic')">基础</button>
                <button class="filter-tab" onclick="filterContent('advanced')">进阶</button>
                <button class="filter-tab" onclick="filterContent('master')">绝学</button>
            </div>
            <div id="library-content" class="content-grid">
                <!-- 动态加载内容 -->
            </div>
        </main>
    </div>
    <script src="../app.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>年龄验证 - 红尘灵境</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        .age-verification-container {
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .verification-card {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 600px;
            width: 100%;
            box-shadow: 0 10px 40px rgba(0,0,0,0.2);
            animation: fadeInUp 0.5s ease-out;
        }

        .verification-header {
            text-align: center;
            margin-bottom: 30px;
        }

        .verification-icon {
            font-size: 4em;
            margin-bottom: 20px;
        }

        .verification-header h1 {
            color: #667eea;
            font-size: 2em;
            margin-bottom: 15px;
        }

        .verification-header p {
            color: #666;
            line-height: 1.8;
            font-size: 1.1em;
        }

        .age-options {
            display: grid;
            gap: 20px;
            margin: 30px 0;
        }

        .age-option {
            padding: 25px;
            border: 3px solid #e0e0e0;
            border-radius: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
        }

        .age-option:hover {
            border-color: #667eea;
            background: #f8f8ff;
            transform: translateY(-3px);
        }

        .age-option.selected {
            border-color: #667eea;
            background: #f0f0ff;
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.3);
        }

        .age-option h3 {
            color: #333;
            font-size: 1.5em;
            margin-bottom: 10px;
        }

        .age-option p {
            color: #666;
            line-height: 1.6;
        }

        .adult-option {
            border-color: #28a745;
        }

        .adult-option:hover {
            background: #f0fff4;
        }

        .minor-option {
            border-color: #ffc107;
        }

        .minor-option:hover {
            background: #fff8e1;
        }

        .continue-btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 1.2em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            disabled: true;
        }

        .continue-btn:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .continue-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .legal-notice {
            background: #f8f9f9;
            padding: 20px;
            border-radius: 10px;
            margin-top: 25px;
        }

        .legal-notice h4 {
            color: #333;
            margin-bottom: 15px;
        }

        .legal-notice ul {
            color: #666;
            line-height: 1.8;
            margin-left: 20px;
        }

        .legal-notice li {
            margin-bottom: 8px;
        }

        .legal-notice a {
            color: #667eea;
            text-decoration: none;
        }

        .legal-notice a:hover {
            text-decoration: underline;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>
    <div class="age-verification-container">
        <div class="verification-card">
            <div class="verification-header">
                <div class="verification-icon">🎂</div>
                <h1>年龄验证</h1>
                <p>为了确保您的使用体验和符合法律法规要求，请确认您的年龄段</p>
            </div>

            <div class="age-options">
                <div class="age-option adult-option" onclick="selectAge('adult')" id="adultOption">
                    <h3>👤 我已满14周岁</h3>
                    <p>我可以独立使用本应用，并遵守相关服务条款</p>
                </div>

                <div class="age-option minor-option" onclick="selectAge('minor')" id="minorOption">
                    <h3>👶 我未满14周岁</h3>
                    <p>我需要在监护人的陪同和指导下使用本应用</p>
                </div>
            </div>

            <button class="continue-btn" id="continueBtn" onclick="continueAction()" disabled>
                继续
            </button>

            <div class="legal-notice">
                <h4>法律说明</h4>
                <ul>
                    <li>根据《未成年人保护法》，未满14周岁的未成年人应在监护人指导下使用</li>
                    <li>我们不会收集未成年人的身份证号、银行账号等敏感信息</li>
                    <li>未成年人使用时长、消费等将受到限制</li>
                    <li>监护人可以设置使用限制、查看使用记录等</li>
                    <li>详细信息请参阅<a href="privacy-policy.html" target="_blank">隐私政策</a>和<a href="terms-of-service.html" target="_blank">服务条款</a></li>
                </ul>
            </div>
        </div>
    </div>

    <script>
        let selectedAge = null;

        function selectAge(ageGroup) {
            selectedAge = ageGroup;

            // 移除所有选中状态
            document.getElementById('adultOption').classList.remove('selected');
            document.getElementById('minorOption').classList.remove('selected');

            // 添加选中状态
            if (ageGroup === 'adult') {
                document.getElementById('adultOption').classList.add('selected');
            } else {
                document.getElementById('minorOption').classList.add('selected');
            }

            // 启用继续按钮
            document.getElementById('continueBtn').disabled = false;
        }

        function continueAction() {
            // 记录年龄验证结果
            const verificationData = {
                ageGroup: selectedAge,
                verificationTime: new Date().toISOString(),
                verified: true
            };

            localStorage.setItem('ageVerification', JSON.stringify(verificationData));
            console.log('年龄验证完成:', verificationData);

            // 根据年龄段跳转
            if (selectedAge === 'adult') {
                alert('验证成功！欢迎使用红尘灵境');
                window.location.href = 'index.html';
            } else {
                alert('感谢您的诚实！请监护人陪同您使用本应用');
                window.location.href = 'index.html';
            }
        }

        // 页面加载时检查是否已验证
        window.onload = function() {
            const existingVerification = localStorage.getItem('ageVerification');
            if (existingVerification) {
                const verification = JSON.parse(existingVerification);
                if (verification.verified) {
                    if (confirm('您已经完成年龄验证，是否跳转到首页？')) {
                        window.location.href = 'index.html';
                    }
                }
            }
        };
    </script>
</body>
</html>

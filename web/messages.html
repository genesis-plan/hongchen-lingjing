<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>青鸟星驿 - 消息中心 | 红尘灵境</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'PingFang SC', sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            color: #fff;
        }
        .container { max-width: 800px; margin: 0 auto; padding: 20px; }
        
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        
        .logo {
            font-size: 24px;
            background: linear-gradient(90deg, #0ea5e9, #38bdf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .nav-links a {
            color: rgba(255,255,255,0.8);
            text-decoration: none;
            margin-left: 20px;
        }
        
        .header {
            text-align: center;
            padding: 40px 0;
        }
        
        .header h1 {
            font-size: 32px;
            margin-bottom: 10px;
        }
        
        .compose-btn {
            display: inline-block;
            padding: 12px 30px;
            background: linear-gradient(90deg, #0ea5e9, #38bdf8);
            color: #fff;
            border-radius: 25px;
            text-decoration: none;
            margin-top: 20px;
        }
        
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .tab {
            padding: 10px 20px;
            background: rgba(255,255,255,0.1);
            border-radius: 20px;
            cursor: pointer;
        }
        
        .tab.active {
            background: #0ea5e9;
        }
        
        .message-list {
            background: rgba(255,255,255,0.05);
            border-radius: 16px;
            overflow: hidden;
        }
        
        .message-item {
            padding: 20px;
            border-bottom: 1px solid rgba(255,255,255,0.1);
            display: flex;
            gap: 15px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .message-item:hover {
            background: rgba(255,255,255,0.05);
        }
        
        .message-item.unread {
            background: rgba(14, 165, 233, 0.1);
        }
        
        .avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, #0ea5e9, #38bdf8);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }
        
        .message-content {
            flex: 1;
        }
        
        .message-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 5px;
        }
        
        .sender {
            font-weight: bold;
        }
        
        .time {
            font-size: 12px;
            color: rgba(255,255,255,0.5);
        }
        
        .preview {
            color: rgba(255,255,255,0.7);
            font-size: 14px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        
        .empty {
            text-align: center;
            padding: 60px 20px;
            color: rgba(255,255,255,0.5);
        }
        
        .典籍 {
            text-align: center;
            margin-top: 30px;
            color: rgba(255,255,255,0.5);
            font-style: italic;
        }
    </style>
</head>
<body>
    <div class="container">
        <nav>
            <div class="logo">💌 青鸟星驿</div>
            <div class="nav-links">
                <a href="/">首页</a>
                <a href="/skills">技能库</a>
                <a href="/profile">个人主页</a>
            </div>
        </nav>
        
        <div class="header">
            <h1>💌 消息中心</h1>
            <p>《山海经》青鸟信使 - 跨越时空的交流</p>
            <a href="#" class="compose-btn">✉️ 写封信</a>
        </div>
        
        <div class="tabs">
            <div class="tab active">全部消息</div>
            <div class="tab">收到的</div>
            <div class="tab">发出的</div>
            <div class="tab">系统通知</div>
        </div>
        
        <div class="message-list">
            <div class="empty">
                <div style="font-size: 50px; margin-bottom: 20px;">📭</div>
                <p>暂无消息</p>
                <p style="font-size: 14px; margin-top: 10px;">
                    当有人给你发送消息或成为你的师傅时<br>你会在此处收到通知
                </p>
            </div>
        </div>
        
        <div class="典籍">
            《山海经》："又北二百里，曰发鸠之山，其上多柘木，有鸟焉，其状如乌，文首，白喙，赤足，名曰'精卫'，其鸣自詨。"
        </div>
    </div>
</body>
</html>

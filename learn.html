<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>正在学习 · 琅嬛福地</title>
    <link rel="stylesheet" href="css/common.css">
    <style>
        .learn-container { max-width: 800px; margin: 0 auto; padding: 20px; }
        .learn-header { 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); 
            color: white; padding: 30px; border-radius: 16px; margin-bottom: 30px;
        }
        .learn-header h1 { margin: 0 0 10px 0; font-size: 1.8em; }
        .progress-bar { background: rgba(255,255,255,0.3); height: 8px; border-radius: 4px; overflow: hidden; margin-top: 15px; }
        .progress-fill { background: #fff; height: 100%; border-radius: 4px; transition: width 0.5s ease; }
        .progress-text { text-align: center; margin-top: 8px; font-size: 0.9em; opacity: 0.9; }
        
        .steps-nav { display: flex; justify-content: center; gap: 10px; margin-bottom: 30px; flex-wrap: wrap; }
        .step-dot { 
            width: 40px; height: 40px; border-radius: 50%; background: #f0f0f0; 
            display: flex; align-items: center; justify-content: center; 
            font-weight: bold; color: #999; cursor: pointer; transition: all 0.3s;
        }
        .step-dot.active { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; transform: scale(1.1); }
        .step-dot.completed { background: #52c41a; color: white; }
        
        .content-card { background: white; border-radius: 16px; padding: 30px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); margin-bottom: 20px; }
        .content-card h2 { color: #333; margin-top: 0; display: flex; align-items: center; gap: 10px; }
        .content-card h2 .step-number { 
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); 
            color: white; width: 36px; height: 36px; border-radius: 50%; 
            display: flex; align-items: center; justify-content: center; font-size: 0.8em;
        }
        .content-body { font-size: 1.1em; line-height: 1.8; color: #444; margin: 20px 0; white-space: pre-line; }
        
        .tip-box { 
            background: linear-gradient(135deg, #fffbe6 0%, #fff7e6 100%); 
            border-left: 4px solid #faad14; padding: 20px; border-radius: 8px; margin: 20px 0;
        }
        .tip-box::before { content: "💡 "; font-size: 1.2em; }
        
        .action-bar { display: flex; justify-content: space-between; align-items: center; margin-top: 30px; padding-top: 20px; border-top: 1px solid #eee; }
        .btn { padding: 12px 30px; border: none; border-radius: 25px; font-size: 1em; cursor: pointer; transition: all 0.3s; font-weight: 500; }
        .btn-prev { background: #f0f0f0; color: #666; }
        .btn-prev:hover { background: #e0e0e0; }
        .btn-next { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; }
        .btn-next:hover { transform: translateY(-2px); box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4); }
        .btn-finish { background: linear-gradient(135deg, #52c41a 0%, #389e0d 100%); color: white; animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.05); } }
        
        .complete-screen { text-align: center; padding: 60px 20px; display: none; }
        .complete-screen.show { display: block; animation: celebrate 0.8s ease; }
        @keyframes celebrate { 0% { transform: scale(0.8); opacity: 0; } 50% { transform: scale(1.05); } 100% { transform: scale(1); opacity: 1; } }
        .complete-icon { font-size: 5em; margin-bottom: 20px; }
        .complete-title { font-size: 2em; color: #333; margin-bottom: 15px; }
        .points-earned { 
            background: linear-gradient(135deg, #ffd700 0%, #ffaa00 100%); 
            color: white; padding: 15px 30px; border-radius: 30px; font-size: 1.3em; font-weight: bold; display: inline-block; margin: 20px 0;
        }
        .back-link { display: inline-flex; align-items: center; gap: 8px; color: #667eea; text-decoration: none; margin-bottom: 20px; font-weight: 500; }
        .back-link:hover { text-decoration: underline; }
        
        @media (max-width: 600px) {
            .learn-header { padding: 20px; }
            .content-card { padding: 20px; }
            .action-bar { flex-direction: column; gap: 15px; }
            .btn { width: 100%; }
        }
    </style>
</head>
<body>
    <div class="learn-container">
        <a href="index.html" class="back-link">← 返回技能列表</a>
        
        <div class="learn-header">
            <h1 id="skillTitle">正在加载...</h1>
            <p id="skillSummary"></p>
            <div class="progress-bar"><div class="progress-fill" id="progressBar" style="width: 0%"></div></div>
            <div class="progress-text" id="progressText">步骤 1 / 3</div>
        </div>
        
        <div class="steps-nav" id="stepsNav"></div>
        <div id="learnContent"></div>
        
        <div class="complete-screen" id="completeScreen">
            <div class="complete-icon">🎉</div>
            <h2 class="complete-title">恭喜你完成学习！</h2>
            <p>你已经掌握了这项新技能</p>
            <div class="points-earned">+ <span id="earnedPoints">0</span> 积分</div>
            <div style="margin-top: 30px;">
                <button class="btn btn-next" onclick="backToHome()">继续探索其他技能</button>
            </div>
        </div>
    </div>

    <script>
        // MVP技能数据
        const MVP_SKILLS = [
            {
                id: "doubao-101",
                title: "国产AI助手入门（豆包/通义/文心）",
                summary: "国内最火的AI工具用法，5分钟上手，接单变现",
                points: 50,
                steps: [
                    { step: 1, title: "选择你的AI助手", content: "国内三大AI助手对比：\n\n• 豆包（字节）- 最火！嵌入抖音，日常聊天、写作、翻译全搞定\n• 通义千问（阿里）- 代码能力强，适合程序员和电商\n• 文心一言（百度）- 中文理解强，搜索增强，信息准确\n\n💡 建议：新手先下载豆包，体验最好", tip: "豆包App store和各大应用商店都能下载" },
                    { step: 2, title: "基础对话与功能探索", content: "打开豆包，试试这些指令：\n\n• '帮我写一段自我介绍'\n• '用Python写一个计算器'\n• '解释什么是AI'\n• '帮我制定本周工作计划'\n\n💡 技巧：越具体的问题，得到答案越准确", tip: "加上身份词效果更好，如'你是一位资深营养师'" },
                    { step: 3, title: "AI变现实战案例", content: "学会这些，马上能变现：\n\n• 短视频文案：'帮我写3条防晒衣带货文案'\n• 朋友圈微商：'生成10条吸睛产品海报文案'\n• 写简历：'优化我的简历，突出运营经验'\n• 小红书笔记：'写一篇成都旅游攻略，800字'\n\n💡 变现路径：闲鱼接单/小红书博主/私域变现", tip: "先从简单文案做起，一单5-20元" }
                ]
            },
            {
                id: "jianying-101",
                title: "短视频剪辑（剪映）7天入门",
                summary: "抖音小红书必备技能，7天学会接单赚钱",
                points: 60,
                steps: [
                    { step: 1, title: "剪映界面与基础操作", content: "下载剪映（免费），认识界面：\n\n• 导入：点击'+'导入视频/图片\n• 剪辑：拖动时间轴剪辑片段\n• 添加：底部添加音乐/文字/特效\n• 导出：右上角导出720P/1080P\n\n💡 新手先练这4个功能就够了", tip: "剪映有官方免费教程，在'创作学院'里" },
                    { step: 2, title: "3个爆款剪辑技巧", content: "记住这3个技巧，视频点赞翻倍：\n\n1. 节奏剪辑：音乐卡点，每2-3秒切换画面\n2. 黄金3秒：开头必须抓眼球（冲突/疑问/惊艳）\n3. 添加字幕：识别字幕+花字，提高完播率\n\n💡 实操：找一段音乐，跟随节奏剪15秒", tip: "多用热门音乐，流量更好" },
                    { step: 3, title: "变现接单实战", content: "学会剪映后，这些变现方式：\n\n• 短视频代剪：闲鱼/淘宝接单，50-200元/条\n• 中视频计划：播放量分成，1万播放约20元\n• 账号代运营：包月3000-5000元/月\n• 小红书博主：接广告200-1000元/条\n\n💡 起手：先从闲鱼接单开始，一单50元", tip: "作品集做好了再谈更高价格" }
                ]
            },
            {
                id: "photo-101",
                title: "手机摄影技巧 - 朋友圈制胜法则",
                summary: "用手机拍出高级感朋友圈，小红书涨粉利器",
                points: 40,
                steps: [
                    { step: 1, title: "构图决定一切", content: "3个万能构图公式：\n\n1. 三分法：打开网格线，主体放在交叉点\n2. 留白：画面留40%空白，更有艺术感\n3. 引导线：道路/栏杆引导视线到主体\n\n💡 打开手机设置→相机→网格线", tip: "拍10张不如精拍1张，多尝试角度" },
                    { step: 2, title: "光线是照片的灵魂", content: "4种光线场景应对：\n\n• 晴天：顺光拍，早晨/傍晚光线最柔\n• 阴天：直接拍，氛围感反而更好\n• 室内：靠窗坐，自然光最出片\n• 夜景：打开夜景模式，手持2秒\n\n💡 用手指点击屏幕对焦，向上拉增加曝光", tip: "正午光线最差，避免这个时段拍照" },
                    { step: 3, title: "后期修图与变现", content: "推荐修图App（免费）：\n\n• 醒图 - 国人开发，功能全\n• Snapseed - 谷歌出品，专业\n• 美图秀秀 - 简单快捷\n\n修图万能公式：\n亮度+10 → 对比度+15 → 饱和度-5 → 色温-5\n\n变现方式：\n• 约拍：199-499元/组\n• 图库投稿：视觉中国/图虫\n• 摄影教学：小红书发教程", tip: "醒图一键美化很好用，新手够用" }
                ]
            }
        ];

        let currentSkill = null;
        let currentStep = 1;
        let completedSteps = [];

        document.addEventListener('DOMContentLoaded', function() {
            const urlParams = new URLSearchParams(window.location.search);
            const skillId = urlParams.get('skill');
            
            currentSkill = MVP_SKILLS.find(s => s.id === skillId);
            if (!currentSkill) {
                document.getElementById('learnContent').innerHTML = '<div class="content-card"><p style="text-align:center;color:#999;">❌ 技能不存在</p></div>';
                return;
            }
            
            // 恢复进度
            const saved = localStorage.getItem(`learnProgress_${skillId}`);
            if (saved) {
                const progress = JSON.parse(saved);
                currentStep = progress.currentStep || 1;
                completedSteps = progress.completedSteps || [];
            }
            
            renderHeader();
            renderStepsNav();
            renderStepContent();
        });

        function renderHeader() {
            document.getElementById('skillTitle').textContent = currentSkill.title;
            document.getElementById('skillSummary').textContent = currentSkill.summary;
            updateProgress();
        }

        function updateProgress() {
            const progress = (currentStep / 3) * 100;
            document.getElementById('progressBar').style.width = `${progress}%`;
            document.getElementById('progressText').textContent = `步骤 ${currentStep} / 3`;
        }

        function renderStepsNav() {
            const nav = document.getElementById('stepsNav');
            nav.innerHTML = currentSkill.steps.map((step, idx) => {
                const stepNum = idx + 1;
                let className = 'step-dot';
                if (stepNum === currentStep) className += ' active';
                else if (completedSteps.includes(stepNum)) className += ' completed';
                return `<div class="${className}" onclick="goToStep(${stepNum})">${completedSteps.includes(stepNum) ? '✓' : stepNum}</div>`;
            }).join('');
        }

        function renderStepContent() {
            if (currentStep > 3) {
                showCompleteScreen();
                return;
            }
            
            document.getElementById('completeScreen').classList.remove('show');
            
            const step = currentSkill.steps[currentStep - 1];
            const content = document.getElementById('learnContent');
            
            content.innerHTML = `
                <div class="content-card">
                    <h2><span class="step-number">${step.step}</span>${step.title}</h2>
                    <div class="content-body">${step.content}</div>
                    ${step.tip ? `<div class="tip-box">${step.tip}</div>` : ''}
                    <div class="action-bar">
                        <button class="btn btn-prev" onclick="prevStep()" ${currentStep === 1 ? 'style="visibility:hidden;"' : ''}>上一步</button>
                        <button class="btn ${currentStep === 3 ? 'btn-finish' : 'btn-next'}" onclick="nextStep()">${currentStep === 3 ? '✓ 完成学习' : '下一步'}</button>
                    </div>
                </div>
            `;
        }

        function goToStep(step) {
            if (step > currentStep && !completedSteps.includes(currentStep)) return;
            currentStep = step;
            saveProgress();
            updateProgress();
            renderStepsNav();
            renderStepContent();
        }

        function prevStep() {
            if (currentStep > 1) {
                currentStep--;
                saveProgress();
                updateProgress();
                renderStepsNav();
                renderStepContent();
            }
        }

        function nextStep() {
            if (!completedSteps.includes(currentStep)) {
                completedSteps.push(currentStep);
            }
            
            if (currentStep < 3) {
                currentStep++;
                saveProgress();
                updateProgress();
                renderStepsNav();
                renderStepContent();
            } else {
                saveProgress();
                showCompleteScreen();
            }
        }

        function saveProgress() {
            localStorage.setItem(`learnProgress_${currentSkill.id}`, JSON.stringify({
                currentStep: currentStep,
                completedSteps: completedSteps,
                lastUpdated: new Date().toISOString()
            }));
        }

        function showCompleteScreen() {
            document.getElementById('learnContent').style.display = 'none';
            document.getElementById('stepsNav').style.display = 'none';
            document.querySelector('.learn-header').style.display = 'none';
            document.getElementById('completeScreen').classList.add('show');
            document.getElementById('earnedPoints').textContent = currentSkill.points;
            
            // 保存完成记录
            localStorage.setItem(`skillCompleted_${currentSkill.id}`, JSON.stringify({
                completedAt: new Date().toISOString(),
                points: currentSkill.points
            }));
        }

        function backToHome() {
            window.location.href = 'index.html';
        }
    </script>
    <footer class="app-footer" style="margin-top: 40px; text-align: center; padding: 20px;">
        <p class="footer-links">
            <a href="privacy.html">隐私政策</a> | 
            <a href="terms.html">用户协议</a> | 
            <a href="index.html">返回首页</a>
        </p>
        <p style="font-size: 0.75em; color: #999; margin-top: 8px;">
            粤ICP备2026031206号-1 | 粤公网安备44011402001267号
        </p>
    </footer>
</body>
</html>

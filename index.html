<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>琅嬛福地 · 红尘灵境</title>
    <link rel="stylesheet" href="css/common.css">
</head>
<body>
    <div class="app-container">
        <!-- 顶部栏 -->
        <header class="app-header">
            <div class="header-content">
                <h1 class="logo-text">🏛️ 琅嬛福地</h1>
                <p class="logo-subtitle">红尘灵境 · 技能藏经阁</p>
            </div>
        </header>

        <!-- 主内容区 -->
        <main class="main-content">
            <!-- Banner -->
            <section class="hero-section">
                <h2>📚 琅嬛福地</h2>
                <p class="slogan">「 天雨粟，鬼夜哭，远古先民造文字 」</p>
                <p class="subtitle">汇集世间技艺，传承千年智慧</p>
                
                <div class="search-box">
                    <input type="text" id="searchInput" placeholder="搜索你想要的技能..." onkeyup="searchSkills()">
                    <button class="search-btn" onclick="searchSkills()">🔍</button>
                </div>
            </section>

            <!-- 分类筛选 -->
            <section class="category-section">
                <div class="category-tabs" id="categoryTabs">
                    <button class="cat-tab active" data-category="all" onclick="App.filterCategory('all')">全部</button>
                    <button class="cat-tab" data-category="ai-tools" onclick="App.filterCategory('ai-tools')">🤖 AI工具</button>
                    <button class="cat-tab" data-category="life" onclick="App.filterCategory('life')">📷 生活摄影</button>
                </div>
            </section>

            <!-- 技能列表 -->
            <section class="skills-section">
                <div class="skills-grid" id="skillsGrid">
                    <!-- 技能卡片由JS动态加载 -->
                </div>
            </section>

            <!-- 待开发功能提示 -->
            <section class="coming-soon-section">
                <h3>🚧 更多功能</h3>
                <div class="coming-soon-grid">
                    <div class="coming-soon-item">
                        <span class="cs-icon">💜</span>
                        <span class="cs-name">紫薇AI助手</span>
                        <span class="cs-status">待开发</span>
                    </div>
                    <div class="coming-soon-item">
                        <span class="cs-icon">👤</span>
                        <span class="cs-name">个人中心</span>
                        <span class="cs-status">待开发</span>
                    </div>
                    <div class="coming-soon-item">
                        <span class="cs-icon">📜</span>
                        <span class="cs-name">心愿云墙</span>
                        <span class="cs-status">待开发</span>
                    </div>
                    <div class="coming-soon-item">
                        <span class="cs-icon">📋</span>
                        <span class="cs-name">任务星阁</span>
                        <span class="cs-status">待开发</span>
                    </div>
                    <div class="coming-soon-item">
                        <span class="cs-icon">🛠️</span>
                        <span class="cs-name">造化工坊</span>
                        <span class="cs-status">待开发</span>
                    </div>
                    <div class="coming-soon-item">
                        <span class="cs-icon">🎭</span>
                        <span class="cs-name">两仪墟市</span>
                        <span class="cs-status">待开发</span>
                    </div>
                </div>
            </section>
        </main>

        <!-- 底部 -->
        <footer class="app-footer">
            <p>红尘灵境 · 琅嬛福地 | 技能学习，从这里开始</p>
            <p class="footer-links">
                <a href="privacy.html">隐私政策</a> | 
                <a href="terms.html">用户协议</a> | 
                <a href="https://xn--0ns36f36xyln.com/" target="_blank">访问主站</a>
            </p>
            <p style="font-size: 0.75em; color: #999; margin-top: 8px;">
                粤ICP备2026031206号-1 | 粤公网安备44011402001267号
            </p>
            </p>
        </footer>
    </div>

    <!-- 技能详情弹窗 -->
    <div id="skillModal" class="modal" style="display:none;" onclick="closeSkillModal(event)">
        <div class="modal-content" onclick="event.stopPropagation()">
            <span class="modal-close" onclick="closeSkillModal()">✕</span>
            <div id="skillDetailContent">
                <!-- 技能详情由JS动态加载 -->
            </div>
        </div>
    </div>

    <!-- 脚本 -->
    <script src="js/app.js"></script>
    <script src="js/feedback.js"></script>
    <script src="js/xiaohongshu.js"></script>
</body>
</html>
